<div class="h-screen overflow-hidden flex flex-col bg-gray-100 dark:bg-gray-950 transition-colors">
  <app-top-bar
    (navigateHome)="navigateTo('table')"
    (navigatePlayers)="navigateTo('players')"
    (navigateSettings)="navigateTo('settings')"
  />

  @switch (currentView()) {
    @case ('table') {
      <app-table
        class="flex-1 overflow-hidden flex flex-col"
        (seatClicked)="onSeatClicked($event)"
      />
    }
    @case ('players') {
      <div class="flex-1 overflow-y-auto">
        <app-player-list
          (playerSelected)="onPlayerSelected($event)"
          (goBack)="navigateTo('table')"
        />
      </div>
    }
    @case ('settings') {
      <div class="flex-1 overflow-y-auto">
        <app-settings (goBack)="navigateTo('table')" />
      </div>
    }
  }

  @if (selectedPlayerId(); as playerId) {
    <app-player-profile
      [playerId]="playerId"
      [open]="showPlayerProfile()"
      (close)="onCloseProfile()"
      (playerDeleted)="onCloseProfile()"
    />
  }
</div>
